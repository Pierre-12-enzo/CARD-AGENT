# render.yaml - Complete configuration for Card Agent Backend
services:
  - type: web
    name: card-agent-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: PORT
        value: 10000
      
      - key: MONGO_URI
        sync: false  # Will be set manually in Render dashboard (sensitive)
      
      - key: JWT_SECRET
        sync: false  # Will be set manually in Render dashboard (sensitive)
      
      - key: CLOUDINARY_CLOUD_NAME
        value: doit5fqrs
      
      - key: CLOUDINARY_API_KEY
        value: 997569586985169
      
      - key: CLOUDINARY_API_SECRET
        value: HJOfAFv4fKlg25sYKZF7s7ldmbg
      
      - key: EMAIL_HOST
        value: smtp.gmail.com
      
      - key: EMAIL_PORT
        value: "587"
      
      - key: EMAIL_SECURE
        value: "false"
      
      - key: EMAIL_USER
        value: dusenge.enzo87@gmail.com
      
      - key: EMAIL_PASSWORD
        sync: false  # Sensitive - set in dashboard
      
      - key: EMAIL_FROM
        value: "Card Agent" <noreply@cardagent.rw>
      
      - key: FRONTEND_URL
        value: https://card-agent-virid.vercel.app
      
      - key: BACKEND_URL
        value: https://card-agent-backend.onrender.com

  # Optional: Keep-alive cron job (using Render Cron Jobs - Beta feature)

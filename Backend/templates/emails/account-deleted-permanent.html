<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8fafc;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .header {
            background: #7f1d1d;
            padding: 40px 30px;
            text-align: center;
            border-bottom: 3px solid #dc2626;
        }

        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
        }

        .body {
            padding: 30px;
            text-align: center;
        }

        .body p {
            color: #475569;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .footer {
            background: #f1f5f9;
            padding: 20px 30px;
            text-align: center;
        }

        .footer p {
            color: #94a3b8;
            font-size: 12px;
            margin: 4px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Account Permanently Deleted</h1>
        </div>
        <div class="body">
            <p>Hello <strong>{{firstName}}</strong>,</p>
            <p>Your CARD-AGENT account with <strong>{{companyName}}</strong> has been permanently deleted by
                <strong>{{adminName}}</strong>.</p>
            <p>All your data and access have been removed. This action cannot be undone.</p>
            <p style="margin-top: 16px; font-size: 13px; color: #94a3b8;">
                Deletion Date: {{deletionDate}}
            </p>
        </div>
        <div class="footer">
            <p><strong>{{appName}}</strong> &copy; {{currentYear}}</p>
        </div>
    </div>
</body>

</html>

<!-- public/favicon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background - Crimson/Red gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="photoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- Rounded Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  
  <!-- Subtle Border Glow -->
  <rect width="100" height="100" rx="22" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.3"/>

  <!-- ID Card Shape -->
  <rect x="12" y="18" width="76" height="52" rx="6" fill="url(#cardGrad)" stroke="#dc2626" stroke-width="1.5"/>
  
  <!-- Card Inner Border -->
  <rect x="15" y="21" width="70" height="46" rx="4" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.2"/>

  <!-- Photo Placeholder -->
  <rect x="20" y="26" width="22" height="22" rx="4" fill="url(#photoGrad)" stroke="#dc2626" stroke-width="1.2"/>
  
  <!-- Camera Icon Inside Photo -->
  <circle cx="31" cy="37" r="5" fill="none" stroke="#dc2626" stroke-width="1.2"/>
  <rect x="28.5" y="35" width="5" height="1" rx="0.5" fill="#dc2626" opacity="0.6"/>
  <circle cx="31" cy="37" r="2.5" fill="#dc2626" opacity="0.3"/>

  <!-- Name Line -->
  <rect x="48" y="28" width="32" height="4" rx="2" fill="#dc2626" opacity="0.7"/>
  <rect x="48" y="34" width="24" height="3" rx="1.5" fill="#dc2626" opacity="0.5"/>

  <!-- ID/Number Line -->
  <rect x="48" y="40" width="18" height="3" rx="1.5" fill="#dc2626" opacity="0.6"/>
  
  <!-- Class/Department Line -->
  <rect x="48" y="46" width="26" height="3" rx="1.5" fill="#dc2626" opacity="0.4"/>
  
  <!-- Bottom Line -->
  <rect x="48" y="52" width="20" height="2.5" rx="1.25" fill="#dc2626" opacity="0.3"/>

  <!-- Card Icon at Bottom -->
  <rect x="18" y="56" width="12" height="8" rx="2" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="0.8"/>
  
  <!-- "CARD" Text Badge -->
  <rect x="70" y="54" width="14" height="8" rx="2" fill="#dc2626" opacity="0.15"/>
  <text x="77" y="59.5" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="#dc2626" text-anchor="middle" opacity="0.6">ID</text>

  <!-- CARD-AGENT Text at Bottom -->
  <text x="50" y="84" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1.5" opacity="0.9">CARD-AGENT</text>
  
  <!-- Small Decorative Dot -->
  <circle cx="50" cy="91" r="1.5" fill="white" opacity="0.4"/>
</svg>
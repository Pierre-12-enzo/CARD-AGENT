<!-- public/favicon-simple.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  
  <!-- ID Card Icon -->
  <rect x="18" y="22" width="64" height="44" rx="6" fill="white" opacity="0.95" stroke="white" stroke-width="1"/>
  <rect x="18" y="22" width="64" height="44" rx="6" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  
  <!-- Photo -->
  <rect x="26" y="30" width="18" height="18" rx="4" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1"/>
  <circle cx="35" cy="39" r="5" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  
  <!-- Text Lines -->
  <rect x="50" y="32" width="26" height="3" rx="1.5" fill="#dc2626" opacity="0.7"/>
  <rect x="50" y="38" width="20" height="2.5" rx="1.25" fill="#dc2626" opacity="0.5"/>
  <rect x="50" y="44" width="22" height="2.5" rx="1.25" fill="#dc2626" opacity="0.4"/>
  <rect x="50" y="50" width="16" height="2.5" rx="1.25" fill="#dc2626" opacity="0.3"/>
  
  <!-- Bottom Text -->
  <text x="50" y="84" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">CARD-AGENT</text>
</svg>